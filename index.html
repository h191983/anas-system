<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام أنس - الإصدار النهائي</title>
<style>
body{font-family:Tahoma;background:#f5f5f5;margin:0}
.header{background:#1f3b57;color:#fff;padding:15px;font-size:22px}
.container{padding:15px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px}
input,button{padding:8px;margin:5px;border-radius:6px;border:1px solid #ccc}
button{cursor:pointer}
.btn{background:#2563eb;color:#fff}
.btn-red{background:#dc2626;color:#fff}
table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{border:1px solid #ddd;padding:6px;text-align:center}
.auto{background:#eee;font-weight:bold}
</style>
</head>

<body>

<div class="header">نظام أنس - المرحلة النهائية</div>

<div class="container">

<h3>الربح الكلي للمشروع</h3>
<input id="profit" type="number" placeholder="اكتب الربح">

<h3>الشركاء</h3>
<input id="pname" placeholder="اسم الشريك">
<input id="ppercent" type="number" placeholder="النسبة %">
<button class="btn" onclick="addPartner()">إضافة</button>

<table id="partners"></table>

<h3>المساهمين داخل الشركة</h3>
<input id="iname" placeholder="اسم المساهم">
<input id="iamount" type="number" placeholder="المبلغ">
<button class="btn" onclick="addInvestor()">إضافة</button>

<table id="investors"></table>

</div>

<script>

let partners=[]
let investors=[]

function num(v){return Number(v||0)}
function money(v){return num(v).toLocaleString()+" ر.س"}

function totalPartnerPercent(){
return partners.reduce((s,x)=>s+num(x.percent),0)
}

function companyPercent(){
return 100-totalPartnerPercent()
}

function companyProfit(){
return num(document.getElementById("profit").value)*(companyPercent()/100)
}

function addPartner(){
let name=document.getElementById("pname").value
let percent=num(document.getElementById("ppercent").value)

if(!name||percent<=0)return alert("بيانات غلط")

if(totalPartnerPercent()+percent>100)return alert("مجموع النسب أكبر من 100")

partners.push({name,percent})

render()
}

function addInvestor(){
let name=document.getElementById("iname").value
let amount=num(document.getElementById("iamount").value)

let base=companyProfit()

let total=investors.reduce((s,x)=>s+num(x.amount),0)

if(!name||amount<=0)return alert("بيانات غلط")

if(amount+total>base)return alert("المبلغ أكبر من نصيب الشركة")

investors.push({name,amount})

render()
}

function render(){

// الشركاء
let phtml=""
let profit=num(document.getElementById("profit").value)

phtml+=`<tr class="auto"><td>الشركة</td><td>${companyPercent().toFixed(2)}%</td><td>${money(companyProfit())}</td></tr>`

partners.forEach(p=>{
phtml+=`<tr>
<td>${p.name}</td>
<td>${p.percent}%</td>
<td>${money(profit*(p.percent/100))}</td>
</tr>`
})

document.getElementById("partners").innerHTML=phtml

// المساهمين
let ihtml=""
let base=companyProfit()
let total=investors.reduce((s,x)=>s+num(x.amount),0)

let companyRemain=base-total
let companyRatio=base?companyRemain/base*100:0

ihtml+=`<tr class="auto">
<td>الشركة</td>
<td>${money(companyRemain)}</td>
<td>${companyRatio.toFixed(2)}%</td>
<td>${money(companyRemain)}</td>
</tr>`

investors.forEach(i=>{
let ratio=base?i.amount/base*100:0
ihtml+=`<tr>
<td>${i.name}</td>
<td>${money(i.amount)}</td>
<td>${ratio.toFixed(2)}%</td>
<td>${money(i.amount)}</td>
</tr>`
})

document.getElementById("investors").innerHTML=ihtml
}

</script>

</body>
</html>
